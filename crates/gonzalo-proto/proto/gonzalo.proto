syntax = "proto3";

package gonzalo.v1;

// The Gonzalo daemon service. Payloads are JSON-encoded gonzalo-core types
// carried as bytes, so the protobuf schema stays small and the two
// transports (gRPC and HTTP/JSON) share one serialization.
service Gonzalo {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc TicketSync(TicketSyncRequest) returns (TicketSyncResponse);
}

message GetRequest {
  string namespace = 1;
  string collection = 2;
  string id = 3;
}

message GetResponse {
  bool found = 1;
  // JSON of gonzalo_core::Record when found.
  bytes record_json = 2;
}

message PutRequest {
  // JSON of gonzalo_core::Record.
  bytes record_json = 1;
  // JSON of Option<gonzalo_core::Revision> (the expected parent revision).
  bytes expected_json = 2;
}

message PutResponse {
  // "committed" or "conflict".
  string outcome = 1;
  // JSON of Revision (committed) or Conflict (conflict).
  bytes payload_json = 2;
}

message ListRequest {
  optional string namespace = 1;
  optional string collection = 2;
}

message ListResponse {
  // JSON of each RecordKey.
  repeated bytes keys_json = 1;
}

message TicketSyncRequest {
  // JSON of gonzalo_ticket_config::Connection.
  bytes connection_json = 1;
}

// Unlike the other responses (which carry bytes ..._json), the sync summary is
// three small counts, so they ride as plain numeric fields.
message TicketSyncResponse {
  uint64 imported = 1;
  uint64 updated = 2;
  uint64 unchanged = 3;
}
